name: Build and publish wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14]
        # ubuntu-latest: Linux x86_64 (manylinux2014)
        # macos-13: Intel x86_64
        # macos-14: Apple Silicon arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install libomp (macOS only)
        if: runner.os == 'macOS'
        run: brew install libomp

      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux* pp*"
          # Linux: install libgomp inside the manylinux container.
          # cibuildwheel runs in a container so brew/apt on the host don't help.
          CIBW_BEFORE_ALL_LINUX: "yum install -y libgomp"
          # macOS: libomp is installed on the host by the step above;
          # tell the linker where to find its headers and libs.
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET="14.0"
            CFLAGS="-I$(brew --prefix libomp)/include"
            CXXFLAGS="-I$(brew --prefix libomp)/include"
            LDFLAGS="-L$(brew --prefix libomp)/lib"
          # Archs
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "auto"
          # Bundle libomp into macOS wheel so end-users don't need brew
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            DYLD_LIBRARY_PATH=$(brew --prefix libomp)/lib
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
